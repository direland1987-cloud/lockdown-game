<!DOCTYPE html>
<html>
<head>
  <title>Test</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    body { background: #111; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .box { background: #222; padding: 40px; border-radius: 16px; text-align: center; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    try {
      var root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(React.createElement("div", {className:"box"}, 
        React.createElement("h1", null, "LOCKDOWN TEST"),
        React.createElement("p", null, "React loaded OK! If you see this, React is working."),
        React.createElement("p", null, "React version: " + React.version)
      ));
    } catch(e) {
      document.getElementById("root").innerHTML = "<div class='box'><h1>ERROR</h1><pre>" + e.message + "\n" + e.stack + "</pre></div>";
    }
  </script>
</body>
</html>
