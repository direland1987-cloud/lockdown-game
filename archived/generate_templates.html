<!DOCTYPE html>
<html><head><title>Generate Grapple Templates</title>
<style>
body { background:#1a1a2e; color:#eee; font-family:monospace; padding:20px; }
canvas { border:1px solid #333; margin:4px; image-rendering:pixelated; }
.row { display:flex; gap:8px; margin:8px 0; align-items:center; }
.label { width:180px; font-size:12px; }
#output { background:#111; padding:12px; border-radius:8px; margin-top:20px; max-height:400px; overflow:auto; font-size:10px; word-break:break-all; }
button { background:#4CAF50; color:white; border:none; padding:10px 20px; cursor:pointer; border-radius:4px; font-size:14px; }
</style>
</head>
<body>
<h2>BJJ Grapple Template Generator</h2>
<p>128×128 pixel art templates with zone colors for palette swap engine</p>
<div id="canvases"></div>
<button onclick="generateAll()">Generate All & Copy Base64</button>
<div id="output"></div>

<script>
const SIZE = 128;

const Z = {
  topSkin:  {r:255,g:100,b:100},
  topGear:  {r:100,g:255,b:100},
  topBelt:  {r:100,g:100,b:255},
  topHead:  {r:255,g:50, b:50},
  btmSkin:  {r:255,g:255,b:100},
  btmGear:  {r:255,g:100,b:255},
  btmBelt:  {r:100,g:255,b:255},
  btmHead:  {r:255,g:200,b:50},
};

function c(z) { return `rgb(${z.r},${z.g},${z.b})`; }
function cd(z,f=0.72) { return `rgb(${Math.round(z.r*f)},${Math.round(z.g*f)},${Math.round(z.b*f)})`; }
function cl(z,f=1.2) { return `rgb(${Math.min(255,Math.round(z.r*f))},${Math.min(255,Math.round(z.g*f))},${Math.min(255,Math.round(z.b*f))})`; }

// Pixel art primitives
function px(ctx,x,y,w,h,color) {
  ctx.fillStyle=color;
  ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h));
}

function outline(ctx,x,y,w,h,t=1) {
  ctx.fillStyle="#111";
  ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),t); // top
  ctx.fillRect(Math.round(x),Math.round(y+h-t),Math.round(w),t); // btm
  ctx.fillRect(Math.round(x),Math.round(y),t,Math.round(h)); // left
  ctx.fillRect(Math.round(x+w-t),Math.round(y),t,Math.round(h)); // right
}

function circle(ctx,cx,cy,r,zone) {
  ctx.fillStyle=c(zone);
  ctx.beginPath();
  ctx.arc(Math.round(cx),Math.round(cy),r,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle="#111";
  ctx.lineWidth=1.5;
  ctx.stroke();
}

// ═══ BODY DRAWING FUNCTIONS ═══
// Draw a pixel-art fighter body. Returns nothing, draws directly.

function drawTorso(ctx,cx,cy,w,h,skin,gear,belt,angle=0) {
  ctx.save();
  ctx.translate(cx,cy);
  if(angle) ctx.rotate(angle*Math.PI/180);
  // Torso
  px(ctx,-w/2,-h/2,w,h,c(skin));
  px(ctx,-w/2,-h/2,w,2,cd(skin)); // shadow top edge
  px(ctx,-w/2+1,h/2-2,w-2,2,cd(skin,0.85)); // shadow bottom
  // Outline
  outline(ctx,-w/2,-h/2,w,h);
  ctx.restore();
}

function drawShorts(ctx,cx,cy,w,h,gear,belt,angle=0) {
  ctx.save();
  ctx.translate(cx,cy);
  if(angle) ctx.rotate(angle*Math.PI/180);
  px(ctx,-w/2,0,w,h,c(gear));
  px(ctx,-w/2,0,w,2,cd(gear)); // waistband shadow
  outline(ctx,-w/2,0,w,h);
  // Belt
  px(ctx,-w/2,-2,w,3,c(belt));
  outline(ctx,-w/2,-2,w,3);
  ctx.restore();
}

function drawLimb(ctx,x,y,w,h,skin,angle=0) {
  ctx.save();
  ctx.translate(x,y);
  if(angle) ctx.rotate(angle*Math.PI/180);
  px(ctx,0,0,w,h,c(skin));
  px(ctx,0,0,w,1,cd(skin));
  outline(ctx,0,0,w,h);
  ctx.restore();
}

// ═══ POSITION GENERATORS ═══

function genGuard(variant) {
  const cv = document.createElement('canvas');
  cv.width=cv.height=SIZE;
  const ctx=cv.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  const mm = variant==='mismatch';
  const ts = mm?1.12:1, bs = mm?0.9:1;

  // === BOTTOM FIGHTER (on back, legs wrapped) ===
  // Torso - horizontal, center-bottom area
  const bTW=24*bs, bTH=14*bs;
  drawTorso(ctx, 64, 86, bTW, bTH, Z.btmSkin, Z.btmGear, Z.btmBelt);
  drawShorts(ctx, 64, 86+bTH/2-1, bTW-4, 8*bs, Z.btmGear, Z.btmBelt);

  // Bottom legs (wrapping upward around top fighter)
  drawLimb(ctx, 36, 52, 8*bs, 30*bs, Z.btmSkin); // left leg up
  drawLimb(ctx, 84, 52, 8*bs, 30*bs, Z.btmSkin); // right leg up
  // Shorts on legs
  px(ctx, 36, 50, 8*bs, 7*bs, c(Z.btmGear));
  outline(ctx, 36, 50, 8*bs, 7*bs);
  px(ctx, 84, 50, 8*bs, 7*bs, c(Z.btmGear));
  outline(ctx, 84, 50, 8*bs, 7*bs);

  // Bottom arms (defending/framing)
  drawLimb(ctx, 48, 76, 6*bs, 12*bs, Z.btmSkin, -20);
  drawLimb(ctx, 74, 76, 6*bs, 12*bs, Z.btmSkin, 20);

  // Bottom head
  circle(ctx, 64, 102, 8*bs, Z.btmHead);

  // === TOP FIGHTER (kneeling in guard) ===
  const tTW=22*ts, tTH=18*ts;
  drawTorso(ctx, 64, 42, tTW, tTH, Z.topSkin, Z.topGear, Z.topBelt);
  drawShorts(ctx, 64, 42+tTH/2-1, tTW-4, 8*ts, Z.topGear, Z.topBelt);

  // Top legs (kneeling)
  drawLimb(ctx, 46, 58, 10*ts, 14*ts, Z.topSkin);
  drawLimb(ctx, 72, 58, 10*ts, 14*ts, Z.topSkin);

  // Top arms (on bottom's torso)
  drawLimb(ctx, 50, 32, 6*ts, 14*ts, Z.topSkin, -10);
  drawLimb(ctx, 72, 32, 6*ts, 14*ts, Z.topSkin, 10);

  // Top head
  circle(ctx, 64, 22, 9*ts, Z.topHead);

  return cv;
}

function genMount(variant) {
  const cv = document.createElement('canvas');
  cv.width=cv.height=SIZE;
  const ctx=cv.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  const mm = variant==='mismatch';
  const ts = mm?1.12:1, bs = mm?0.9:1;

  // === BOTTOM (flat on back, mounted on) ===
  drawTorso(ctx, 64, 84, 26*bs, 14*bs, Z.btmSkin, Z.btmGear, Z.btmBelt);
  drawShorts(ctx, 64, 84+7*bs-1, 22*bs, 8*bs, Z.btmGear, Z.btmBelt);
  // Legs extending outward
  drawLimb(ctx, 30, 88, 18*bs, 8*bs, Z.btmSkin);
  drawLimb(ctx, 80, 88, 18*bs, 8*bs, Z.btmSkin);
  // Arms (defensive frames)
  drawLimb(ctx, 44, 72, 6*bs, 14*bs, Z.btmSkin, -15);
  drawLimb(ctx, 78, 72, 6*bs, 14*bs, Z.btmSkin, 15);
  circle(ctx, 64, 100, 8*bs, Z.btmHead);

  // === TOP (straddling, dominant mount) ===
  drawTorso(ctx, 64, 38, 22*ts, 20*ts, Z.topSkin, Z.topGear, Z.topBelt);
  drawShorts(ctx, 64, 48, 20*ts, 8*ts, Z.topGear, Z.topBelt);
  // Straddling legs
  drawLimb(ctx, 38, 54, 12*ts, 16*ts, Z.topSkin, 5);
  drawLimb(ctx, 78, 54, 12*ts, 16*ts, Z.topSkin, -5);
  px(ctx, 38, 54, 12*ts, 5, c(Z.topGear)); outline(ctx, 38, 54, 12*ts, 5);
  px(ctx, 78, 54, 12*ts, 5, c(Z.topGear)); outline(ctx, 78, 54, 12*ts, 5);
  // Arms pressing down
  drawLimb(ctx, 50, 36, 6*ts, 16*ts, Z.topSkin, -8);
  drawLimb(ctx, 72, 36, 6*ts, 16*ts, Z.topSkin, 8);
  circle(ctx, 64, 18, 9*ts, Z.topHead);

  return cv;
}

function genSideControl(variant) {
  const cv = document.createElement('canvas');
  cv.width=cv.height=SIZE;
  const ctx=cv.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  const mm = variant==='mismatch';
  const ts = mm?1.12:1, bs = mm?0.9:1;

  // === BOTTOM (flat on back, pinned, perpendicular) ===
  drawTorso(ctx, 64, 86, 24*bs, 14*bs, Z.btmSkin, Z.btmGear, Z.btmBelt);
  drawShorts(ctx, 64, 86+7*bs-1, 20*bs, 8*bs, Z.btmGear, Z.btmBelt);
  drawLimb(ctx, 30, 90, 18*bs, 7*bs, Z.btmSkin);
  drawLimb(ctx, 82, 90, 16*bs, 7*bs, Z.btmSkin);
  drawLimb(ctx, 50, 74, 5*bs, 12*bs, Z.btmSkin, -10);
  drawLimb(ctx, 74, 74, 5*bs, 12*bs, Z.btmSkin, 10);
  circle(ctx, 82, 96, 8*bs, Z.btmHead);

  // === TOP (perpendicular, chest-to-chest, ~90° angle) ===
  ctx.save();
  ctx.translate(52, 50);
  ctx.rotate(-22 * Math.PI/180);
  drawTorso(ctx, 0, 0, 22*ts, 16*ts, Z.topSkin, Z.topGear, Z.topBelt);
  drawShorts(ctx, 0, 8*ts-1, 18*ts, 7*ts, Z.topGear, Z.topBelt);
  // Arms - crossface and underhook
  drawLimb(ctx, -14*ts, -6, 6*ts, 14*ts, Z.topSkin, -15);
  drawLimb(ctx, 8*ts, -6, 6*ts, 14*ts, Z.topSkin, 15);
  // Legs sprawled
  drawLimb(ctx, -16*ts, 12, 12*ts, 8*ts, Z.topSkin, -30);
  drawLimb(ctx, 8*ts, 14, 12*ts, 8*ts, Z.topSkin, 10);
  ctx.restore();
  circle(ctx, 36, 30, 9*ts, Z.topHead);

  return cv;
}

function genHalfGuard(variant) {
  const cv = document.createElement('canvas');
  cv.width=cv.height=SIZE;
  const ctx=cv.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  const mm = variant==='mismatch';
  const ts = mm?1.12:1, bs = mm?0.9:1;

  // === BOTTOM (on back, one leg trapping) ===
  drawTorso(ctx, 64, 84, 24*bs, 14*bs, Z.btmSkin, Z.btmGear, Z.btmBelt);
  drawShorts(ctx, 64, 84+7*bs-1, 20*bs, 8*bs, Z.btmGear, Z.btmBelt);
  // Free leg
  drawLimb(ctx, 30, 86, 16*bs, 7*bs, Z.btmSkin);
  // Trapping leg (wrapping around top's leg)
  drawLimb(ctx, 58, 56, 8*bs, 26*bs, Z.btmSkin);
  px(ctx, 58, 54, 8*bs, 7*bs, c(Z.btmGear)); outline(ctx, 58, 54, 8*bs, 7*bs);
  // Arms
  drawLimb(ctx, 48, 72, 6*bs, 12*bs, Z.btmSkin, -10);
  drawLimb(ctx, 76, 72, 6*bs, 12*bs, Z.btmSkin, 10);
  circle(ctx, 76, 98, 8*bs, Z.btmHead);

  // === TOP (partially past legs) ===
  ctx.save();
  ctx.translate(58, 46);
  ctx.rotate(-12 * Math.PI/180);
  drawTorso(ctx, 0, 0, 22*ts, 16*ts, Z.topSkin, Z.topGear, Z.topBelt);
  drawShorts(ctx, 0, 8*ts-1, 18*ts, 7*ts, Z.topGear, Z.topBelt);
  drawLimb(ctx, -12*ts, -4, 6*ts, 14*ts, Z.topSkin, -10);
  drawLimb(ctx, 6*ts, -4, 6*ts, 14*ts, Z.topSkin, 10);
  // One leg trapped, one free
  drawLimb(ctx, -8*ts, 12, 10*ts, 14*ts, Z.topSkin);
  drawLimb(ctx, 4*ts, 14, 10*ts, 12*ts, Z.topSkin, 15);
  ctx.restore();
  circle(ctx, 48, 24, 9*ts, Z.topHead);

  return cv;
}

function genBackControl(variant) {
  const cv = document.createElement('canvas');
  cv.width=cv.height=SIZE;
  const ctx=cv.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  const mm = variant==='mismatch';
  const ts = mm?1.12:1, bs = mm?0.9:1;

  // === BOTTOM (seated/turtled, back exposed) ===
  drawTorso(ctx, 66, 68, 20*bs, 16*bs, Z.btmSkin, Z.btmGear, Z.btmBelt);
  drawShorts(ctx, 66, 68+8*bs-1, 18*bs, 8*bs, Z.btmGear, Z.btmBelt);
  // Legs folded under
  drawLimb(ctx, 50, 80, 10*bs, 12*bs, Z.btmSkin);
  drawLimb(ctx, 72, 80, 10*bs, 12*bs, Z.btmSkin);
  // Arms forward
  drawLimb(ctx, 56, 56, 6*bs, 14*bs, Z.btmSkin, -20);
  drawLimb(ctx, 72, 56, 6*bs, 14*bs, Z.btmSkin, 20);
  circle(ctx, 72, 54, 8*bs, Z.btmHead);

  // === TOP (behind, seatbelt, hooks in) ===
  drawTorso(ctx, 60, 40, 22*ts, 18*ts, Z.topSkin, Z.topGear, Z.topBelt);
  drawShorts(ctx, 60, 40+9*ts-1, 20*ts, 7*ts, Z.topGear, Z.topBelt);
  // Hooks (legs wrapping around bottom's hips)
  drawLimb(ctx, 40, 58, 8*ts, 18*ts, Z.topSkin);
  drawLimb(ctx, 82, 58, 8*ts, 18*ts, Z.topSkin);
  px(ctx, 40, 58, 8*ts, 5, c(Z.topGear)); outline(ctx, 40, 58, 8*ts, 5);
  px(ctx, 82, 58, 8*ts, 5, c(Z.topGear)); outline(ctx, 82, 58, 8*ts, 5);
  // Seatbelt arms (wrapping around chest)
  px(ctx, 48, 48, 28*ts, 6*ts, c(Z.topSkin));
  outline(ctx, 48, 48, 28*ts, 6*ts);
  circle(ctx, 54, 22, 9*ts, Z.topHead);

  return cv;
}

// ═══ MAIN ═══
const generators = {
  'grapple_guard': genGuard,
  'grapple_halfguard': genHalfGuard,
  'grapple_sidecontrol': genSideControl,
  'grapple_mount': genMount,
  'grapple_backcontrol': genBackControl,
};

function generateAll() {
  const container = document.getElementById('canvases');
  container.innerHTML = '';
  const results = {};

  for (const [base, gen] of Object.entries(generators)) {
    for (const variant of ['similar','mismatch']) {
      const name = `${base}_${variant}`;
      const cv = gen(variant);

      // Display
      const row = document.createElement('div');
      row.className = 'row';
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = name;
      row.appendChild(label);

      // Show at 2x for visibility
      const display = document.createElement('canvas');
      display.width = 256; display.height = 256;
      const dctx = display.getContext('2d');
      dctx.imageSmoothingEnabled = false;
      dctx.drawImage(cv, 0, 0, 256, 256);
      row.appendChild(display);
      container.appendChild(row);

      results[name] = cv.toDataURL('image/png');
    }
  }

  // Output
  const out = document.getElementById('output');
  out.textContent = JSON.stringify(results);

  // Also store globally for console access
  window._templateResults = results;

  // Copy to clipboard
  navigator.clipboard.writeText(JSON.stringify(results)).then(() => {
    out.textContent = '✅ Copied to clipboard!\n\n' + JSON.stringify(results).substring(0, 500) + '...';
  }).catch(() => {
    out.textContent = 'Base64 data (copy manually):\n\n' + JSON.stringify(results);
  });
}

// Auto-generate on load
window.onload = generateAll;
</script>
</body></html>
